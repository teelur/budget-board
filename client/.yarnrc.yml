nodeLinker: node-modules

logFilters:
  - text: "eslint-config-mantine"
    code: YN0060
    level: discard
  - text: "@tanstack/eslint-plugin-query"
    code: YN0060
    level: discard

packageExtensions:
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true
